name: Weekly data refresh

# Re-scrape Artificial Analysis + OpenRouter once a week so the snapshot
# shipped in the repo never goes stale. Also triggerable manually.

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at 12:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Refresh AA scrape
        run: uv run py scrape.py --refresh

      - name: Refresh OpenRouter enrichment
        run: uv run py enrich.py --refresh

      - name: Commit + push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain artifacts/)" ]]; then
            git add artifacts/models.csv artifacts/models.json artifacts/models_enriched.csv artifacts/openrouter.json
            git commit -m "chore: weekly data refresh"
            git push
          else
            echo "No artifact changes; nothing to commit."
          fi
